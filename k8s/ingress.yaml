apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  namespace: replate
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8081

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filter-ingress
  namespace: replate
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /locations
            pathType: Prefix
            backend:
              service:
                name: filter-service
                port:
                  number: 8083
          - path: /categories
            pathType: Prefix
            backend:
              service:
                name: filter-service
                port:
                  number: 8083

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: listing-ingress
  namespace: replate
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /listings
            pathType: Prefix
            backend:
              service:
                name: listing-service
                port:
                  number: 8082
