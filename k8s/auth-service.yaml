---
# Auth Service - ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: replate
data:
  DATABASE_HOST: "mysql-service"
  DATABASE_PORT: "3306"
  DATABASE_USER: "replate_user"
  JWT_EXPIRATION: "86400000"
  SPRING_PROFILES_ACTIVE: "prod"

---
# Auth Service - Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: replate
type: Opaque
stringData:
  DATABASE_PASSWORD: "changeme"  # Should be provided via sealed secrets or external secret manager in production
  JWT_SECRET: "your-base64-encoded-jwt-secret-here"  # Generate with: openssl rand -base64 32

---
# Auth Service - Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: replate
  labels:
    app: auth-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
    spec:
      serviceAccountName: replate-service-account
      containers:
      - name: auth-service
        image: replate/auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: DATABASE_PORT
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-service-secret
              key: DATABASE_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-service-secret
              key: JWT_SECRET
        - name: JWT_EXPIRATION
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: JWT_EXPIRATION
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: auth-service-config
              key: SPRING_PROFILES_ACTIVE
        livenessProbe:
          httpGet:
            path: /auth/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /auth/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
# Auth Service - Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: replate
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: auth-service
  sessionAffinity: None

