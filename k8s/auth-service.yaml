apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: replate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: norbinorbert/replate-auth-service:1.0.1
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: mysql-host
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: mysql-port
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: replate-secrets
                  key: mysql-user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: replate-secrets
                  key: mysql-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: replate-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: jwt-expiration
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: spring-profiles-active
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: replate
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: auth-service

