---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: replate

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: replate-service-account
  namespace: replate

---
# Role for service account
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: replate-role
  namespace: replate
rules:
  - apiGroups: [ "" ]
    resources: [ "configmaps", "secrets" ]
    verbs: [ "get", "list" ]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: replate-rolebinding
  namespace: replate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: replate-role
subjects:
  - kind: ServiceAccount
    name: replate-service-account
    namespace: replate

---
# NetworkPolicy - Allow traffic within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: replate-network-policy
  namespace: replate
spec:
  podSelector: { }
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: replate
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: replate
    - to:
        - namespaceSelector: { }
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# Ingress - Route external traffic to Auth and Listing services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: replate-ingress
  namespace: replate
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
    - hosts:
        - api.replate.local
      secretName: replate-tls-cert
  rules:
    - host: api.replate.local
      http:
        paths:
          # Auth Service endpoints
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          # Listing Service endpoints
          - path: /listings
            pathType: Prefix
            backend:
              service:
                name: listing-service
                port:
                  number: 80
          - path: /images
            pathType: Prefix
            backend:
              service:
                name: listing-service
                port:
                  number: 80
          - path: /locations
            pathType: Prefix
            backend:
              service:
                name: location-service
                port:
                  number: 80
          - path: /categories
            pathType: Prefix
            backend:
              service:
                name: location-service
                port:
                  number: 80
