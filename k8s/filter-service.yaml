apiVersion: apps/v1
kind: Deployment
metadata:
  name: filter-service
  namespace: replate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filter-service
  template:
    metadata:
      labels:
        app: filter-service
    spec:
      containers:
        - name: filter-service
          image: norbinorbert/replate-filter-service:1.0.0
          ports:
            - containerPort: 8083
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: mysql-host
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: mysql-port
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: replate-secrets
                  key: mysql-user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: replate-secrets
                  key: mysql-password
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: replate-config
                  key: spring-profiles-active
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: filter-service
  namespace: replate
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: filter-service

