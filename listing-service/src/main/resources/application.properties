spring.application.name=listing-service
server.port=8082

# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/replate_listings
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.images.upload-dir=./uploads/images

# Auth Service Configuration
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}

# Filter Service Configuration
filter.service.url=${FILTER_SERVICE_URL:http://localhost:8083}

# JWT Configuration
jwt.secret=${JWT_SECRET}

