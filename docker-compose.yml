services:
  mysql:
    image: mysql:latest
    container_name: replate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - replate-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: replate-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-root}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-hSwUZ327v3OdcW9vwkgLcgkXUI0ofVlliMQvZomqaeQ}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-prod}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - replate-network

  filter-service:
    build:
      context: .
      dockerfile: filter-service/Dockerfile
    container_name: replate-filter-service
    ports:
      - "${FILTER_SERVICE_PORT:-8083}:8083"
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-root}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-root}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-prod}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - replate-network

  listing-service:
    build:
      context: .
      dockerfile: listing-service/Dockerfile
    container_name: replate-listing-service
    ports:
      - "${LISTING_SERVICE_PORT:-8082}:8082"
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: ${MYSQL_USER:-root}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-hSwUZ327v3OdcW9vwkgLcgkXUI0ofVlliMQvZomqaeQ}
      AUTH_SERVICE_URL: http://auth-service:8081
      FILTER_SERVICE_URL: http://filter-service:8083
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-prod}
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      filter-service:
        condition: service_healthy
    volumes:
      - uploads:/uploads/images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - replate-network

volumes:
  mysql_data:
  uploads:

networks:
  replate-network:
    driver: bridge

